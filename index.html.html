<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prescript Device</title>

<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">

<style>
/* Carregando a fonte enviada */
@font-face {
    font-family: 'IndexDevice';
    src: url('Index Device.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

body {
  background: black;
  color: #00aaff;
  /* Aplicando a nova fonte como principal */
  font-family: 'IndexDevice', 'Pixelify Sans', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
  overflow: hidden;
}

.container {
  width: 90%;
  max-width: 360px;
  height: 200px;
  border: 2px solid #00aaff;
  padding: 15px;
  box-shadow: 0 0 25px #00aaff;
  position: relative;
  overflow-y: auto;
  margin-bottom: 15px;
  background: rgba(0, 20, 40, 0.2);
}

#text {
  white-space: pre-wrap;
  font-size: 20px; /* Aumentado levemente para melhor leitura da fonte Index */
  line-height: 1.4;
  letter-spacing: 1px;
}

#text::after {
  content: "_";
  animation: blink 0.8s infinite;
  margin-left: 2px;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

input {
  width: 85%;
  max-width: 360px;
  padding: 12px;
  background: black;
  border: 1px solid #00aaff;
  color: #00aaff;
  font-family: 'IndexDevice', 'Pixelify Sans', monospace;
  margin-bottom: 10px;
  outline: none;
}

button {
  padding: 10px 25px;
  background: #00aaff;
  border: none;
  color: black;
  font-family: 'IndexDevice', sans-serif;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0088cc;
  box-shadow: 0 0 10px #00aaff;
}
</style>
</head>
<body>

<div class="container" id="container">
  <div id="text"></div>
</div>

<input type="text" id="inputText" placeholder="Digite seu Prescript..." autocomplete="off">
<button onclick="start()">EXECUTAR</button>

<script>
let output = document.getElementById("text");
let container = document.getElementById("container");

// Certifique-se que esses arquivos de som existam na pasta também!
const soundScramble = new Audio("index_message_1.wav");
const soundFixed = new Audio("index_message_2.wav");

let chars = "!<>-_\\/[]{}—=+*^?#";

function scrambleWord(word, progress) {
  let scrambled = "";
  for (let i = 0; i < word.length; i++) {
    if (Math.random() < progress) {
      scrambled += word[i];
    } else {
      scrambled += chars[Math.floor(Math.random() * chars.length)];
    }
  }
  return scrambled;
}

function scrambleWordsDomino(sentence, callback) {
  let words = sentence.split(" ");
  let progress = Array(words.length).fill(0); 
  let iterations = 0;
  let maxIterations = 10; 

  soundScramble.loop = true;
  soundScramble.play().catch(() => {});

  let interval = setInterval(() => {
    let displayWords = words.map((word, idx) => {
      if (idx < iterations) {
        return word; 
      } else if (idx === iterations) {
        progress[idx] += 1 / maxIterations;
        return scrambleWord(word, progress[idx]);
      } else {
        return word.split("").map(_ => chars[Math.floor(Math.random() * chars.length)]).join("");
      }
    });

    output.innerHTML = "> " + displayWords.join(" ");
    container.scrollTop = container.scrollHeight;

    if (iterations < words.length && progress[iterations] >= 1) {
      iterations++;
    }

    if (iterations >= words.length) {
      clearInterval(interval);
      soundScramble.pause();
      soundScramble.currentTime = 0;

      soundFixed.currentTime = 0;
      soundFixed.play().catch(() => {});

      output.innerHTML = "> " + words.join(" ");
      if(callback) callback();
    }

  }, 25); 
}

function start() {
  let textInput = document.getElementById("inputText");
  let text = textInput.value.trim();
  if(!text) return;

  soundScramble.play().then(() => { soundScramble.pause(); }).catch(() => {});
  soundFixed.play().then(() => { soundFixed.pause(); }).catch(() => {});

  output.innerHTML = "[INICIALIZANDO INDEX...]\n\n";
  
  setTimeout(() => {
    scrambleWordsDomino(text, () => {});
  }, 500); 

  textInput.value = "";
}

function shake() {
  let x = (Math.random() - 0.5) * 2;
  let y = (Math.random() - 0.5) * 2;
  container.style.transform = `translate(${x}px, ${y}px)`;
}

setInterval(() => {
  if (Math.random() < 0.1) shake();
}, 100);
</script>

</body>
</html>
