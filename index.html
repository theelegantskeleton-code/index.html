<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Index - Neon Final Fix</title>
    <style>
        body {
            background-color: #010205;
            color: #00d9ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 10px #00d9ff, 0 0 25px #0055ff;
        }

        #display-area {
            text-align: center;
            width: 95%;
        }

        #output {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 6px;
            min-height: 1.2em;
            word-break: break-all;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            #output {
                font-size: 1.8rem;
                letter-spacing: 2px;
            }
            input {
                width: 80% !important;
            }
        }

        #input-container {
            position: fixed;
            bottom: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #00d9ff;
            color: #00d9ff;
            font-size: 1rem;
            padding: 10px;
            width: 350px;
            text-align: center;
            outline: none;
            font-family: monospace;
            opacity: 0.5;
            transition: 0.3s;
        }

        input:focus { opacity: 1; width: 400px; }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(0, 0, 255, 0.05), rgba(0, 255, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div id="display-area">
        <div id="output">SISTEMA PRONTO.</div>
    </div>

    <div id="input-container">
        <input type="text" id="userInput" placeholder="DIGITE O PRECEITO" autocomplete="off" autofocus>
    </div>

    <script>
        const outputElement = document.getElementById('output');
        const inputElement = document.getElementById('userInput');
        
        // Configuração de Web Audio para Loop Perfeito
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let scrambleSource = null;
        let scrambleBuffer = null;

        // Carrega o áudio 1 em buffer para evitar gaps
        fetch('index_message_1.wav')
            .then(response => response.arrayBuffer())
            .then(data => audioCtx.decodeAudioData(data))
            .then(buffer => { scrambleBuffer = buffer; })
            .catch(e => console.log("Erro ao carregar loop: ", e));

        const soundFixed = new Audio("index_message_2.wav");

        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789§∆ΓΩΨΦΣΞ._   ';
        let isProcessing = false;

        function playScrambleLoop() {
            if (!scrambleBuffer) return;
            scrambleSource = audioCtx.createBufferSource();
            scrambleSource.buffer = scrambleBuffer;
            scrambleSource.loop = true;
            scrambleSource.connect(audioCtx.destination);
            scrambleSource.start(0);
        }

        function stopScrambleLoop() {
            if (scrambleSource) {
                scrambleSource.stop();
                scrambleSource = null;
            }
        }

        function runPrescript(finalText) {
            if (isProcessing) return;
            isProcessing = true;

            playScrambleLoop();

            let iteration = 0;
            const scrambleDuration = 2000; 
            const startTime = Date.now();

            const interval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                
                const result = finalText.split("").map((letter, index) => {
                    if (elapsed >= scrambleDuration) {
                        if (index < iteration) {
                            return finalText[index];
                        }
                    }
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join("");

                outputElement.innerText = result;

                if (elapsed >= scrambleDuration) {
                    iteration += 0.7; 
                }

                if (iteration >= finalText.length) {
                    outputElement.innerText = finalText;
                    clearInterval(interval);
                    
                    stopScrambleLoop();
                    
                    soundFixed.currentTime = 0;
                    soundFixed.play().catch(() => {});

                    isProcessing = false;
                }
            }, 35);
        }

        inputElement.addEventListener('keyup', function (e) {
            if (e.key === 'Enter' || e.keyCode === 13) {
                const message = this.value; 
                if (message.trim() !== "") {
                    // Retoma o AudioContext (necessário para navegadores modernos)
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                    
                    soundFixed.play().then(() => { soundFixed.pause(); }).catch(() => {});
                    
                    runPrescript(message);
                    this.value = '';
                    this.blur(); 
                }
            }
        });
    </script>
</body>
</html>
